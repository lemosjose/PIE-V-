# ================================================================
# Docker Compose - COBOL DB2 (TRE0028)
#
# Arquitetura:
#   db2   -> Imagem oficial IBM DB2 (banco de dados + precompilador)
#   cobol -> Ubuntu + GnuCOBOL (compilacao COBOL)
#
# Uso:
#   1. cp env.example .env
#   2. podman-compose up -d
#   3. Aguarde o DB2 inicializar (acompanhe: podman-compose logs -f db2)
#   4. Inicialize o banco:
#      podman-compose exec db2 su - db2inst1 -c "/cobol/scripts/init-db.sh"
#   5. Pre-compile (PREP) dentro do DB2:
#      podman-compose exec db2 su - db2inst1 -c "cd /cobol/src && db2 connect to testdb && db2 prep TRE0028.sqc bindfile"
#   6. Compile com GnuCOBOL:
#      podman-compose exec cobol cobc -x TRE0028.cbl
# ================================================================

services:
  db2:
    image: icr.io/db2_community/db2
    privileged: true
    environment:
      LICENSE: accept
      DB2INST1_PASSWORD: ${DB2_PASSWORD:-db2inst1}
      DBNAME: TESTDB
      AUTOCONFIG: "false"
    ports:
      - "50000:50000"
    volumes:
      - db2data:/database
      - ./src:/cobol/src
      - ./scripts:/cobol/scripts
    healthcheck:
      test: [ "CMD", "su", "-", "db2inst1", "-c", "db2 connect to testdb && db2 connect reset" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  cobol:
    build: .
    volumes:
      - ./src:/cobol/src
    depends_on:
      - db2

volumes:
  db2data:
